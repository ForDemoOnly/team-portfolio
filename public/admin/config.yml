# Decap CMS config for the team portfolio.
#
# Local editing:
#   • `npm run cms` + `npm run dev` → http://localhost:4321/admin
#   • `local_backend: true` below is only active on localhost, so it's safe in prod.
#
# Production editing:
#   • GitHub backend commits every save straight to `main`.
#   • Uses Netlify's free public OAuth proxy (`api.netlify.com`) — no server to run.
#   • Requires a GitHub OAuth app with the callback URL https://api.netlify.com/auth/done

local_backend: true

backend:
  name: github
  repo: CHANGEME-github-user/CHANGEME-repo   # e.g. tptindev/team-portfolio
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Uploads land here — served at /uploads/<filename>
media_folder: public/uploads
public_folder: /uploads

# Keep the local site previewable while editing
display_url: /
site_url: /

collections:
  - name: site
    label: Site settings
    delete: false
    editor: { preview: false }
    files:
      - name: default
        label: Site
        file: src/content/site/default.json
        fields:
          - { name: team_name, label: Team name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: about, label: About (shown on /about), widget: text, required: false }
          - { name: contact_email, label: Contact email, widget: string, required: false }
          - name: socials
            label: Socials
            widget: object
            required: false
            fields:
              - { name: github, label: GitHub URL, widget: string, required: false }
              - { name: linkedin, label: LinkedIn URL, widget: string, required: false }
              - { name: x, label: X / Twitter URL, widget: string, required: false }
              - { name: website, label: Website URL, widget: string, required: false }

  - name: team
    label: Team members
    folder: src/content/team
    create: true
    slug: '{{slug}}'
    identifier_field: name
    extension: md
    format: yaml-frontmatter
    editor: { preview: false }
    fields:
      - { name: name, label: Name, widget: string }
      - { name: role, label: Role, widget: string }
      - { name: photo, label: Photo, widget: image, required: false }
      - { name: sort_order, label: Sort order, widget: number, default: 0, value_type: int }
      - name: socials
        label: Socials
        widget: object
        required: false
        fields:
          - { name: github, label: GitHub, widget: string, required: false }
          - { name: linkedin, label: LinkedIn, widget: string, required: false }
          - { name: x, label: X / Twitter, widget: string, required: false }
          - { name: website, label: Website, widget: string, required: false }
      - { name: body, label: Bio, widget: markdown }

  - name: projects
    label: Projects
    folder: src/content/projects
    create: true
    slug: '{{slug}}'
    identifier_field: title
    extension: md
    format: yaml-frontmatter
    editor: { preview: false }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: Summary, widget: string, hint: '1–2 sentences, used everywhere' }
      - { name: image, label: Cover image, widget: image, required: false }
      - { name: link_url, label: Link URL, widget: string, required: false }
      - { name: tech_stack, label: Tech stack, widget: list, default: [], allow_add: true }
      - { name: featured, label: Featured on home, widget: boolean, default: false }
      - { name: sort_order, label: Sort order, widget: number, default: 0, value_type: int }
      - { name: body, label: Description, widget: markdown }
